services:
  appel-offres-service:
    build: .
    container_name: al-mizan-appel-offres-service
    ports:
      - "8003:8003"
    environment:
      PORT: "8003"
      NODE_ENV: production
      # Base de données propre au service Appel d'Offres
      DATABASE_URL: postgresql://ao_user:secret@appel-offres-postgres:5432/ao_db?schema=public
      DB_HOST: appel-offres-postgres
      DB_PORT: "5432"
      DB_NAME: ao_db
      DB_USER: ao_user
      DB_PASSWORD: secret

      # Infrastructure partagée (via al-mizan-network)
      REDIS_HOST: redis
      REDIS_PORT: "6379"

      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672"
      RABBITMQ_EXCHANGE_AO: ao.events
      RABBITMQ_QUEUE_AO: ao.queue

      # Référence vers le Document Service (pour la récupération des URLs)
      DOCUMENT_SERVICE_URL: "http://al-mizan-document-service:8005"

      # API Gateway sécurité
      API_GATEWAY_SECRET: shared_secret_for_header_validation
    depends_on:
      appel-offres-postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - al-mizan-network

  # Base de données dédiée au service Appel d'Offres
  appel-offres-postgres:
    image: postgres:15-alpine
    container_name: al-mizan-ao-postgres
    environment:
      POSTGRES_USER: ao_user
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: ao_db
    ports:
      - "5432:5432"
    volumes:
      - ao-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ao_user -d ao_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - al-mizan-network

volumes:
  ao-postgres-data:
    name: al-mizan-ao-postgres-data

networks:
  al-mizan-network:
    name: al-mizan-network
    external: true

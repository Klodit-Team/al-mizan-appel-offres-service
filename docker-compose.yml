services:
  # PostgreSQL - Transactional DB for ao_db
  postgres:
    image: postgres:15-alpine
    container_name: al-mizan-ao-postgres
    environment:
      POSTGRES_USER: ao_user
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: ao_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ao_user -d ao_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Cache & Rate limiting
  redis:
    image: redis:7-alpine
    container_name: al-mizan-ao-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # MinIO - S3 Object Storage for CDC / PDF
  minio:
    image: minio/minio
    container_name: al-mizan-ao-minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # RabbitMQ - Async Messaging Bus
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: al-mizan-ao-rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  postgres_data:
  redis_data:
  minio_data:
  rabbitmq_data:

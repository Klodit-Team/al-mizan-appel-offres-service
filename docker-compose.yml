services:
  # MySQL - Transactional DB for ao_db
  mysql:
    image: mysql:8.0
    container_name: al-mizan-ao-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ao_db
      MYSQL_USER: ao_user
      MYSQL_PASSWORD: secret
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Cache & Rate limiting
  redis:
    image: redis:7-alpine
    container_name: al-mizan-ao-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # MinIO - S3 Object Storage for CDC / PDF
  minio:
    image: minio/minio
    container_name: al-mizan-ao-minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # RabbitMQ - Async Messaging Bus
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: al-mizan-ao-rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  mysql_data:
  redis_data:
  minio_data:
  rabbitmq_data:
